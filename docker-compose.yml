# ============================================================
#  finance-assistant – docker-compose.yml
#  Passwords are NEVER hardcoded here.
#  Copy .env.example → .env and fill in your own values.
# ============================================================

version: "3.9"

services:

  # ── Infrastructure ─────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    container_name: finance-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - finance-net

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: finance-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
    ports:
      - "5672:5672"   # AMQP
      - "15672:15672" # Management UI
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - finance-net

  # ── Application Services ───────────────────────────────────

  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: finance-api-gateway
    restart: unless-stopped
    environment:
      GATEWAY_PORT: 8080
      TRANSACTION_SERVICE_URL: http://transaction-service:8001
      AI_SERVICE_URL: http://ai-service:8002
      # Danh sách origin frontend được phép (ngăn cách bằng dấu phẩy)
      ALLOWED_ORIGINS: http://localhost,http://localhost:5173,http://localhost:80
    ports:
      - "8080:8080"
    depends_on:
      transaction-service:
        condition: service_healthy
      ai-service:
        condition: service_healthy
    networks:
      - finance-net

  transaction-service:
    build:
      context: ./transaction-service
      dockerfile: Dockerfile
    container_name: finance-transaction-service
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      JWT_SECRET: ${JWT_SECRET}
      RABBITMQ_URL: amqp://${RABBITMQ_DEFAULT_USER}:${RABBITMQ_DEFAULT_PASS}@rabbitmq:5672/
    ports:
      - "8001:8001"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - finance-net

  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: finance-ai-service
    restart: unless-stopped
    environment:
      TRANSACTION_SERVICE_URL: http://transaction-service:8001
      RABBITMQ_URL: amqp://${RABBITMQ_DEFAULT_USER}:${RABBITMQ_DEFAULT_PASS}@rabbitmq:5672/
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    ports:
      - "8002:8002"
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - finance-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: finance-frontend
    restart: unless-stopped
    environment:
      # Vite sử dụng biến này để gọi API gateway đúng port
      VITE_API_BASE_URL: http://localhost:8080
    ports:
      - "80:80"
    depends_on:
      - api-gateway
    networks:
      - finance-net

# ── Volumes ────────────────────────────────────────────────
volumes:
  postgres_data:
  rabbitmq_data:

# ── Networks ───────────────────────────────────────────────
networks:
  finance-net:
    driver: bridge
